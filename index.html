<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Home Page Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
        integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="google-main-container">
        <div class="top-nav">
            <ul>
                <li><a href="#">Gmail</a></li>
                <li><a href="#">Images</a></li>
                <li id="google-apps"><a href="#"></a></li>
                <li id="user-profile"></li>
            </ul>
        </div>
        <div class="main">
            <div class="logo-container">
                <div class="logo"><img src="google-logo.png" alt="Google Logo"></div>
                <div class="search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" name="search" id="search-input" placeholder="Search Google">
                    <img id="microphone" src="mic.png" alt="Microphone">
                    <img id="camera-lens" src="camera-lens.png" alt="Camera Lens">
                </div>
                <div class="buttons">
                    <button id="main-btn">Google Search</button>
                    <button id="sec-btn">I'm Feeling Lucky</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <ul class="left-footer">
            <li><a href="#">About</a></li>
            <li><a href="#">Advertising</a></li>
            <li><a href="#">Business</a></li>
            <li><a href="#">How Search Works</a></li>
        </ul>
        <ul class="right-footer">
            <li><a href="#" id="theme-toggle">Dark theme: on</a></li>
            <li><a href="#">Privacy</a></li>
            <li><a href="#">Terms</a></li>
            <li><a href="#">Settings</a></li>
        </ul>
    </div>
    <script>
        document.getElementById('theme-toggle').addEventListener('click', function () {
            var body = document.body;
            body.classList.toggle('dark-mode');
            var themeToggleLink = document.getElementById('theme-toggle');
            var googleApps = document.getElementById('google-apps');
            if (body.classList.contains('dark-mode')) {
                themeToggleLink.textContent = 'Dark theme: off';
                googleApps.style.backgroundImage = "url('./dark-dots.png')";
            } else {
                themeToggleLink.textContent = 'Dark theme: on';
                googleApps.style.backgroundImage = "url('./light-dots.png')";
            }
        });
    </script>
</body>
</html>
